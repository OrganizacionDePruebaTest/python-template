<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status del Pipeline</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0fdf4;
            color: #166534;
        }
        .card {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid #bbf7d0;
        }
        .status-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        h1 {
            margin: 0;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="status-icon">🚀</div>
        <h1>Pipeline Working Right</h1>
        <p>El despliegue automático se completó correctamente.</p>
    </div>
</body>
</html>
